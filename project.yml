name: OfficeResume
options:
  minimumXcodeGenVersion: 2.44.0
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CODE_SIGN_STYLE: Automatic
    ARCHS: arm64
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  OfficeResumeCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/OfficeResumeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragprod.msofficeresume.core
        GENERATE_INFOPLIST_FILE: YES

  OfficeResumeMAS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/OfficeResumeMAS
      - Sources/MenuUIShared
    dependencies:
      - target: OfficeResumeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragprod.msofficeresume.mas
        PRODUCT_NAME: OfficeResume
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Office Resume
        INFOPLIST_KEY_CFBundleName: Office Resume
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSAppleEventsUsageDescription: Office Resume requires Apple Events to monitor and restore Microsoft Office applications.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/OfficeResumeMAS/OfficeResumeMAS.entitlements
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) BILLING_MAS

  OfficeResumeDirect:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/OfficeResumeDirect
      - Sources/MenuUIShared
    dependencies:
      - target: OfficeResumeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragprod.msofficeresume.direct
        PRODUCT_NAME: OfficeResume
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/OfficeResumeDirect/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/OfficeResumeDirect/OfficeResumeDirect.entitlements
        OFFICE_RESUME_DIRECT_BACKEND_BASE_URL: ""
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) BILLING_DIRECT

  OfficeResumeHelper:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources/OfficeResumeHelper
    dependencies:
      - target: OfficeResumeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragprod.msofficeresume.helper
        PRODUCT_NAME: OfficeResumeHelper
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: OfficeResumeHelper
        INFOPLIST_KEY_CFBundleName: OfficeResumeHelper
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSAppleEventsUsageDescription: Office Resume requires Apple Events to monitor and restore Microsoft Office applications.
        CODE_SIGN_ENTITLEMENTS: Sources/OfficeResumeHelper/OfficeResumeHelper.entitlements

  OfficeResumeCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests/OfficeResumeCoreTests
    dependencies:
      - target: OfficeResumeCore

schemes:
  OfficeResumeMAS:
    build:
      targets:
        OfficeResumeMAS: all
        OfficeResumeCore: all
    test:
      gatherCoverageData: true
      targets:
        - name: OfficeResumeCoreTests

  OfficeResumeDirect:
    build:
      targets:
        OfficeResumeDirect: all
        OfficeResumeCore: all
    test:
      gatherCoverageData: true
      targets:
        - name: OfficeResumeCoreTests

  OfficeResumeHelper:
    build:
      targets:
        OfficeResumeHelper: all
        OfficeResumeCore: all
