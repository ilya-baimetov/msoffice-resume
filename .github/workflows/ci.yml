name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-guardrails:
    name: docs-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run docs consistency checker
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/eval-docs-consistency.sh

  pr-scorecard-guardrail:
    name: pr-scorecard-guardrail
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Validate PR includes eval scorecard path
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_BODY//[$'\t\r\n ']}" ]]; then
            echo "PR body is empty. Include the PR template and fill the eval scorecard section."
            exit 1
          fi

          scorecard_line="$(printf '%s\n' "$PR_BODY" | grep -E '^- Scorecard file/path for this PR:' | head -n1 || true)"
          if [[ -z "$scorecard_line" ]]; then
            echo "Missing required line: '- Scorecard file/path for this PR:'"
            exit 1
          fi

          scorecard_value="$(printf '%s' "$scorecard_line" | sed -E 's/^- Scorecard file\/path for this PR:[[:space:]]*//')"
          scorecard_value="$(printf '%s' "$scorecard_value" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          lower_value="$(printf '%s' "$scorecard_value" | tr '[:upper:]' '[:lower:]')"

          if [[ -z "$scorecard_value" || "$lower_value" == "tbd" || "$lower_value" == "todo" || "$lower_value" == "n/a" || "$lower_value" == "none" ]]; then
            echo "Scorecard path value is empty or placeholder. Provide a real path."
            exit 1
          fi

          echo "PR scorecard path detected: $scorecard_value"

  spec-drift-guardrails:
    name: spec-drift-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate component spec updates when code changes
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${GITHUB_BASE_REF:-main}"
          git fetch origin "${base_ref}" --depth=1
          changed="$(git diff --name-only "origin/${base_ref}"...HEAD)"

          if [[ -z "${changed}" ]]; then
            echo "No changed files detected."
            exit 0
          fi

          echo "Changed files:"
          echo "${changed}"

          has_any() {
            local pattern="$1"
            if echo "${changed}" | grep -Eq "${pattern}"; then
              return 0
            fi
            return 1
          }

          core_changed=false
          helper_changed=false
          ui_changed=false
          backend_changed=false
          failed=false

          if has_any '^Sources/OfficeResumeCore/|^Tests/OfficeResumeCoreTests/'; then
            core_changed=true
          fi
          if has_any '^Sources/OfficeResumeHelper/'; then
            helper_changed=true
          fi
          if has_any '^Sources/OfficeResumeDirect/|^Sources/OfficeResumeMAS/'; then
            ui_changed=true
          fi
          if has_any '^OfficeResumeBackend/'; then
            backend_changed=true
          fi

          if ${core_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/core\.md$'; then
              echo "Core code changed without updating spec.md/specs/contracts.md/specs/core.md"
              failed=true
            fi
          fi

          if ${helper_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/helper-daemon\.md$'; then
              echo "Helper code changed without updating spec.md/specs/contracts.md/specs/helper-daemon.md"
              failed=true
            fi
          fi

          if ${ui_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/menu-ui\.md$'; then
              echo "Menu UI code changed without updating spec.md/specs/contracts.md/specs/menu-ui.md"
              failed=true
            fi
          fi

          if ${backend_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/backend-worker\.md$'; then
              echo "Backend code changed without updating spec.md/specs/contracts.md/specs/backend-worker.md"
              failed=true
            fi
          fi

          if ${failed}; then
            echo "Spec drift guardrail failed."
            exit 1
          fi

          echo "Spec drift guardrails passed."

  build-test-mas:
    name: build-test-mas
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Regenerate Xcode project for runner compatibility
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f project.yml ]]; then
            if ! command -v xcodegen >/dev/null 2>&1; then
              brew install xcodegen
            fi
            xcodegen generate
          fi

      - name: Discover workspace or project
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find . -maxdepth 4 -name '*.xcworkspace' -not -path '*.xcodeproj/*' -print -quit)"
          project="$(find . -maxdepth 4 -name '*.xcodeproj' -print -quit)"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Skip if Xcode project is not scaffolded yet
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project == '' }}
        run: echo "No Xcode workspace/project found yet. Skipping MAS build/test for now."

      - name: Verify MAS scheme exists (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -workspace "${{ steps.discover.outputs.workspace }}" > /tmp/xcode-list-mas.txt
          grep -q "OfficeResumeMAS" /tmp/xcode-list-mas.txt

      - name: Verify MAS scheme exists (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -project "${{ steps.discover.outputs.project }}" > /tmp/xcode-list-mas.txt
          grep -q "OfficeResumeMAS" /tmp/xcode-list-mas.txt

      - name: Build and test MAS scheme (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "${{ steps.discover.outputs.workspace }}" \
            -scheme OfficeResumeMAS \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test

      - name: Build and test MAS scheme (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${{ steps.discover.outputs.project }}" \
            -scheme OfficeResumeMAS \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test

  build-test-direct:
    name: build-test-direct
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Regenerate Xcode project for runner compatibility
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f project.yml ]]; then
            if ! command -v xcodegen >/dev/null 2>&1; then
              brew install xcodegen
            fi
            xcodegen generate
          fi

      - name: Discover workspace or project
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find . -maxdepth 4 -name '*.xcworkspace' -not -path '*.xcodeproj/*' -print -quit)"
          project="$(find . -maxdepth 4 -name '*.xcodeproj' -print -quit)"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Skip if Xcode project is not scaffolded yet
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project == '' }}
        run: echo "No Xcode workspace/project found yet. Skipping Direct build/test for now."

      - name: Verify Direct scheme exists (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -workspace "${{ steps.discover.outputs.workspace }}" > /tmp/xcode-list-direct.txt
          grep -q "OfficeResumeDirect" /tmp/xcode-list-direct.txt

      - name: Verify Direct scheme exists (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -project "${{ steps.discover.outputs.project }}" > /tmp/xcode-list-direct.txt
          grep -q "OfficeResumeDirect" /tmp/xcode-list-direct.txt

      - name: Build and test Direct scheme (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "${{ steps.discover.outputs.workspace }}" \
            -scheme OfficeResumeDirect \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test

      - name: Build and test Direct scheme (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${{ steps.discover.outputs.project }}" \
            -scheme OfficeResumeDirect \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Skip if backend package is not scaffolded yet
        if: ${{ !hashFiles('OfficeResumeBackend/package.json') }}
        run: echo "No OfficeResumeBackend/package.json found yet. Skipping backend tests."

      - name: Install dependencies
        if: ${{ hashFiles('OfficeResumeBackend/package.json') }}
        working-directory: OfficeResumeBackend
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run backend tests
        if: ${{ hashFiles('OfficeResumeBackend/package.json') }}
        working-directory: OfficeResumeBackend
        run: npm test
