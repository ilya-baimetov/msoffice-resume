name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-guardrails:
    name: docs-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run docs consistency checker
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/eval-docs-consistency.sh

  ui-guardrails:
    name: ui-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run UI guardrails
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/eval-ui-guardrails.sh

  worker-dry-run:
    name: worker-dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Validate unified Worker deploy config
        run: wrangler deploy --dry-run

  pr-scorecard-guardrail:
    name: pr-scorecard-guardrail
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Validate PR body guardrails
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          extract_value() {
            local label="$1"
            local line
            line="$(printf '%s\n' "$PR_BODY" | grep -F -- "- ${label}" | head -n1 || true)"
            if [[ -z "$line" ]]; then
              echo ""
              return
            fi
            printf '%s' "${line#- ${label}}"
          }

          is_placeholder() {
            local value="$1"
            local lowered
            lowered="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"
            [[ -z "$value" || "$lowered" == "tbd" || "$lowered" == "todo" || "$lowered" == "n/a" || "$lowered" == "none" ]]
          }

          has_placeholder_token() {
            local value="$1"
            local lowered
            lowered="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"
            [[ "$lowered" =~ (^|[^a-z])(tbd|todo|pending|wip|placeholder)([^a-z]|$) ]]
          }

          if [[ -z "${PR_BODY//[$'\t\r\n ']}" ]]; then
            echo "PR body is empty. Include the PR template and fill the eval scorecard section."
            exit 1
          fi

          scorecard_value="$(extract_value 'Scorecard file/path for this PR:')"
          scorecard_value="$(printf '%s' "$scorecard_value" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if is_placeholder "$scorecard_value"; then
            echo "Missing required line: '- Scorecard file/path for this PR:'"
            exit 1
          fi

          copilot_url="$(extract_value 'Copilot review URL:')"
          copilot_url="$(printf '%s' "$copilot_url" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if is_placeholder "$copilot_url"; then
            echo "Copilot review URL is empty or placeholder."
            exit 1
          fi
          if ! [[ "$copilot_url" =~ ^https:// ]]; then
            echo "Copilot review URL must be a valid https:// link."
            exit 1
          fi
          if has_placeholder_token "$copilot_url"; then
            echo "Copilot review URL contains placeholder text."
            exit 1
          fi

          copilot_findings="$(extract_value 'Copilot high/medium findings summary:')"
          copilot_findings="$(printf '%s' "$copilot_findings" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if is_placeholder "$copilot_findings"; then
            echo "Copilot findings summary is empty or placeholder."
            exit 1
          fi
          if has_placeholder_token "$copilot_findings"; then
            echo "Copilot findings summary contains placeholder text."
            exit 1
          fi

          copilot_disposition="$(extract_value 'Copilot disposition (fixed or explicitly accepted with reason):')"
          copilot_disposition="$(printf '%s' "$copilot_disposition" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if is_placeholder "$copilot_disposition"; then
            echo "Copilot disposition is empty or placeholder."
            exit 1
          fi
          if has_placeholder_token "$copilot_disposition"; then
            echo "Copilot disposition contains placeholder text."
            exit 1
          fi

          echo "PR scorecard path detected: $scorecard_value"
          echo "Copilot review URL detected: $copilot_url"

  spec-drift-guardrails:
    name: spec-drift-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate component spec updates when code changes
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${GITHUB_BASE_REF:-main}"
          git fetch origin "${base_ref}" --depth=1
          changed="$(git diff --name-only "origin/${base_ref}"...HEAD)"

          if [[ -z "${changed}" ]]; then
            echo "No changed files detected."
            exit 0
          fi

          echo "Changed files:"
          echo "${changed}"

          has_any() {
            local pattern="$1"
            if echo "${changed}" | grep -Eq "${pattern}"; then
              return 0
            fi
            return 1
          }

          core_changed=false
          helper_changed=false
          ui_changed=false
          backend_changed=false
          failed=false

          if has_any '^Sources/OfficeResumeCore/|^Tests/OfficeResumeCoreTests/'; then
            core_changed=true
          fi
          if has_any '^Sources/OfficeResumeHelper/'; then
            helper_changed=true
          fi
          if has_any '^Sources/OfficeResumeDirect/|^Sources/MenuUIShared/'; then
            ui_changed=true
          fi
          if has_any '^OfficeResumeBackend/'; then
            backend_changed=true
          fi

          if ${core_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/core\.md$'; then
              echo "Core code changed without updating spec.md/specs/contracts.md/specs/core.md"
              failed=true
            fi
          fi

          if ${helper_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/helper-daemon\.md$'; then
              echo "Helper code changed without updating spec.md/specs/contracts.md/specs/helper-daemon.md"
              failed=true
            fi
          fi

          if ${ui_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/menu-ui\.md$'; then
              echo "Menu UI code changed without updating spec.md/specs/contracts.md/specs/menu-ui.md"
              failed=true
            fi
          fi

          if ${backend_changed}; then
            if ! has_any '^spec\.md$|^specs/contracts\.md$|^specs/backend-worker\.md$'; then
              echo "Backend code changed without updating spec.md/specs/contracts.md/specs/backend-worker.md"
              failed=true
            fi
          fi

          if ${failed}; then
            echo "Spec drift guardrail failed."
            exit 1
          fi

          echo "Spec drift guardrails passed."

  build-test-direct:
    name: build-test-direct
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Regenerate Xcode project for runner compatibility
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f project.yml ]]; then
            if ! command -v xcodegen >/dev/null 2>&1; then
              brew install xcodegen
            fi
            xcodegen generate
          fi

      - name: Discover workspace or project
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          workspace="$(find . -maxdepth 4 -name '*.xcworkspace' -not -path '*.xcodeproj/*' -print -quit)"
          project="$(find . -maxdepth 4 -name '*.xcodeproj' -print -quit)"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Skip if Xcode project is not scaffolded yet
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project == '' }}
        run: echo "No Xcode workspace/project found yet. Skipping Direct build/test for now."

      - name: Verify Direct scheme exists (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -workspace "${{ steps.discover.outputs.workspace }}" > /tmp/xcode-list-direct.txt
          grep -q "OfficeResumeDirect" /tmp/xcode-list-direct.txt

      - name: Verify Direct scheme exists (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -project "${{ steps.discover.outputs.project }}" > /tmp/xcode-list-direct.txt
          grep -q "OfficeResumeDirect" /tmp/xcode-list-direct.txt

      - name: Static analysis Direct scheme (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "${{ steps.discover.outputs.workspace }}" \
            -scheme OfficeResumeDirect \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            analyze

      - name: Static analysis Direct scheme (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${{ steps.discover.outputs.project }}" \
            -scheme OfficeResumeDirect \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            analyze

      - name: Build and test Direct scheme (workspace)
        if: ${{ steps.discover.outputs.workspace != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "${{ steps.discover.outputs.workspace }}" \
            -scheme OfficeResumeDirect \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test

      - name: Build and test Direct scheme (project)
        if: ${{ steps.discover.outputs.workspace == '' && steps.discover.outputs.project != '' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${{ steps.discover.outputs.project }}" \
            -scheme OfficeResumeDirect \
            -destination "platform=macOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build test

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Skip if backend package is not scaffolded yet
        if: ${{ !hashFiles('OfficeResumeBackend/package.json') }}
        run: echo "No OfficeResumeBackend/package.json found yet. Skipping backend tests."

      - name: Install dependencies
        if: ${{ hashFiles('OfficeResumeBackend/package.json') }}
        working-directory: OfficeResumeBackend
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run backend static checks
        if: ${{ hashFiles('OfficeResumeBackend/package.json') }}
        working-directory: OfficeResumeBackend
        run: npm run lint

      - name: Run backend tests
        if: ${{ hashFiles('OfficeResumeBackend/package.json') }}
        working-directory: OfficeResumeBackend
        run: npm test
